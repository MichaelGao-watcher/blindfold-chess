<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>TestRunner Self-Test</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 24px;
    background: #f5f5f7;
    color: #1d1d1f;
  }
  h1 {
    font-size: 24px;
    margin-bottom: 16px;
  }
  #test-results pre {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    font-family: 'SF Mono', Menlo, Monaco, monospace;
    font-size: 13px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<h1>TestRunner Self-Test</h1>
<div id="test-results"></div>

<script src="../../js/test-runner.js"></script>
<script>
TestRunner.suite('TestRunner API', () => {
  TestRunner.test('suite and test registration works', () => {
    TestRunner.assert(true, 'should pass');
  });

  TestRunner.test('assert on truthy value', () => {
    TestRunner.assert(1 === 1, 'basic assert');
  });

  TestRunner.test('assert on falsy throws AssertionError', () => {
    let err = null;
    try { TestRunner.assert(false, 'expected'); } catch (e) { err = e; }
    TestRunner.assert(err !== null, 'should throw');
    TestRunner.assertEqual(err.name, 'AssertionError');
    TestRunner.assertEqual(err.message, 'expected');
  });

  TestRunner.test('assertEqual compares primitives', () => {
    TestRunner.assertEqual(42, 42);
    TestRunner.assertEqual('abc', 'abc');
  });

  TestRunner.test('assertEqual compares objects deeply', () => {
    TestRunner.assertEqual({a: [1, 2]}, {a: [1, 2]});
  });

  TestRunner.test('assertThrows catches expected throw', () => {
    TestRunner.assertThrows(() => { throw new Error('boom'); });
  });

  TestRunner.test('assertThrows fails if no throw', () => {
    let threw = false;
    try { TestRunner.assertThrows(() => {}); } catch (e) { threw = true; }
    TestRunner.assert(threw, 'should throw when no error');
  });
});

TestRunner.suite('TestRunner Async', () => {
  TestRunner.test('async test resolves', async () => {
    const val = await Promise.resolve(99);
    TestRunner.assertEqual(val, 99);
  });

  TestRunner.test('async test with setTimeout', async () => {
    const val = await new Promise(resolve => setTimeout(() => resolve(42), 50));
    TestRunner.assertEqual(val, 42);
  });

  TestRunner.test('async test times out after 5s', async () => {
    await new Promise(() => {}); // never resolves
  });
});

TestRunner.suite('TestRunner Failure Reporting', () => {
  TestRunner.test('intentional failure for report format', () => {
    TestRunner.assertEqual({a: 1}, {a: 2}, 'objects differ');
  });
});

TestRunner.run();
</script>
</body>
</html>
